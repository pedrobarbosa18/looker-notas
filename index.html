<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bloco de Notas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D0D0D;
    --surface: #1A1A1A;
    --surface2: #222222;
    --border: #2E2E2E;
    --border2: #3E3E3E;
    --text: #FFFFFF;
    --muted: #888888;
    --yellow: #F5C400;
    --yellow-dim: #2A2200;
    --yellow-text: #F5C400;
    --danger: #FF4D4D;
    --danger-bg: #2A0A0A;
    --radius: 10px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .header-logo { height: 28px; object-fit: contain; }
  .header-right { text-align: right; }
  .header-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  .form-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  input[type="text"], textarea {
    font-family: var(--font);
    font-size: 13px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--yellow); }
  input[type="text"]::placeholder, textarea::placeholder { color: var(--muted); }
  .input-name { max-width: 170px; flex-shrink: 0; }
  textarea { resize: vertical; min-height: 72px; display: block; margin-bottom: 10px; }

  .form-footer { display: flex; align-items: center; justify-content: space-between; }
  .btn-add {
    background: var(--yellow);
    color: #000;
    border: none;
    border-radius: 7px;
    padding: 9px 18px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-add:hover { opacity: 0.88; }
  .btn-add:active { transform: scale(0.98); }
  .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }
  .spinner {
    width: 13px; height: 13px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg { font-size: 12px; color: var(--yellow); font-family: var(--mono); min-height: 16px; }

  .notes-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .notes-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); font-family: var(--mono);
  }
  .right-actions { display: flex; align-items: center; gap: 8px; }
  .count-badge {
    font-size: 11px; font-family: var(--mono);
    background: var(--yellow-dim); border: 0.5px solid var(--yellow);
    border-radius: 20px; padding: 2px 9px; color: var(--yellow);
  }
  .btn-refresh {
    background: transparent; border: 0.5px solid var(--border);
    border-radius: 7px; padding: 4px 10px; font-size: 12px;
    font-family: var(--mono); color: var(--muted); cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .btn-refresh:hover { background: var(--surface2); color: var(--text); }

  .filter-row { margin-bottom: 10px; }
  .notes-list { display: flex; flex-direction: column; gap: 8px; }
  .note-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-left: 3px solid var(--yellow);
    border-radius: var(--radius);
    padding: 13px 15px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .note-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .note-author { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
  .avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--yellow-dim); border: 0.5px solid var(--yellow);
    color: var(--yellow); font-size: 10px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .note-meta { display: flex; align-items: center; gap: 8px; }
  .note-date { font-size: 11px; font-family: var(--mono); color: var(--muted); }
  .btn-del {
    font-size: 11px; font-family: var(--font); color: var(--danger);
    background: transparent; border: 0.5px solid transparent;
    border-radius: 6px; padding: 3px 8px; cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .btn-del:hover { background: var(--danger-bg); border-color: #5a1a1a; }
  .note-text { font-size: 13.5px; color: #CCCCCC; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .empty { text-align: center; padding: 36px 0; color: var(--muted); font-size: 13px; font-family: var(--mono); }
  .empty span { display: block; font-size: 22px; margin-bottom: 8px; }
  .loading-row { text-align: center; padding: 24px 0; color: var(--muted); font-family: var(--mono); font-size: 13px; }
</style>
</head>

  <div class="header-right">
    <div class="header-title">Bloco de notas</div>
    <div class="header-sub" id="sheetStatus">Conectado ao Google Sheets</div>
  </div>
</div>

<div class="form-card">
  <div class="form-row">
    <input class="input-name" type="text" id="author" placeholder="Seu nome" maxlength="40" />
    <input type="text" id="noteShort" placeholder="Anotação rápida… (Enter para salvar)" maxlength="300" />
  </div>
  <textarea id="noteLong" placeholder="Ou escreva uma anotação mais detalhada aqui…" maxlength="2000"></textarea>
  <div class="form-footer">
    <button class="btn-add" onclick="addNote()" id="btnAdd">
      <div class="spinner" id="spinner"></div>
      + Adicionar nota
    </button>
    <span class="status-msg" id="status"></span>
  </div>
</div>

<div class="notes-header">
  <span class="notes-label">Anotações</span>
  <div class="right-actions">
    <span class="count-badge" id="countBadge">0</span>
    <button class="btn-refresh" onclick="fetchNotes()">↻ atualizar</button>
  </div>
</div>

<div class="filter-row">
  <input type="text" id="filterInput" placeholder="Filtrar por autor ou texto…" oninput="renderNotes()" />
</div>

<div class="notes-list" id="notesList">
  <div class="loading-row">carregando…</div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxLnJ1XQepT8g1q75OY-zUmhifrfqN3cd0bHYz0V7svNKjVgAfFTYzm2H0oncQpKnjQ/exec";
  const LS_AUTHOR_KEY = "looker_notes_author";
  let notes = [];

  function init() {
    const saved = localStorage.getItem(LS_AUTHOR_KEY);
    if (saved) document.getElementById("author").value = saved;
    document.getElementById("author").addEventListener("change", () => {
      localStorage.setItem(LS_AUTHOR_KEY, document.getElementById("author").value.trim());
    });
    document.getElementById("noteShort").addEventListener("keydown", e => {
      if (e.key === "Enter") addNote();
    });
    fetchNotes();
    setInterval(fetchNotes, 60000);
  }

  async function fetchNotes() {
    try {
      const res = await fetch(`${API_URL}?action=list`, { redirect: "follow" });
      const data = await res.json();
      notes = Array.isArray(data) ? data : [];
      renderNotes();
    } catch (e) {
      document.getElementById("notesList").innerHTML =
        '<div class="empty"><span>⚠</span>Erro ao carregar. Verifique a conexão.</div>';
    }
  }

  function renderNotes() {
    const filter = document.getElementById("filterInput").value.toLowerCase();
    const list = document.getElementById("notesList");
    document.getElementById("countBadge").textContent = notes.length;
    let filtered = notes.slice().reverse();
    if (filter) filtered = filtered.filter(n =>
      n.author.toLowerCase().includes(filter) || n.text.toLowerCase().includes(filter)
    );
    if (!filtered.length) {
      list.innerHTML = notes.length === 0
        ? '<div class="empty"><span>📋</span>Nenhuma anotação ainda. Seja o primeiro!</div>'
        : '<div class="empty"><span>🔍</span>Nenhuma nota encontrada.</div>';
      return;
    }
    list.innerHTML = filtered.map(n => `
      <div class="note-card">
        <div class="note-top">
          <div class="note-author">
            <div class="avatar">${esc(initials(n.author))}</div>
            ${esc(n.author)}
          </div>
          <div class="note-meta">
            <span class="note-date">${esc(n.ts)}</span>
            <button class="btn-del" onclick="deleteNote('${esc(n.id)}')">excluir</button>
          </div>
        </div>
        <div class="note-text">${esc(n.text)}</div>
      </div>
    `).join("");
  }

  async function addNote() {
    const author = document.getElementById("author").value.trim();
    const short  = document.getElementById("noteShort").value.trim();
    const long   = document.getElementById("noteLong").value.trim();
    const text   = long || short;
    if (!author) { setStatus("⚠ Informe seu nome."); return; }
    if (!text)   { setStatus("⚠ Escreva uma anotação."); return; }
    setLoading(true);
    try {
      await fetch(`${API_URL}?action=add&author=${encodeURIComponent(author)}&text=${encodeURIComponent(text)}`, { redirect: "follow" });
      document.getElementById("noteShort").value = "";
      document.getElementById("noteLong").value  = "";
      localStorage.setItem(LS_AUTHOR_KEY, author);
      setStatus("✓ Nota salva!");
      setTimeout(() => setStatus(""), 2500);
      await fetchNotes();
    } catch (e) {
      setStatus("⚠ Erro ao salvar.");
    } finally {
      setLoading(false);
    }
  }

  async function deleteNote(id) {
    if (!confirm("Excluir esta nota?")) return;
    try {
      await fetch(`${API_URL}?action=delete&id=${encodeURIComponent(id)}`, { redirect: "follow" });
      await fetchNotes();
    } catch (e) { setStatus("⚠ Erro ao excluir."); }
  }

  function setLoading(on) {
    document.getElementById("spinner").style.display = on ? "block" : "none";
    document.getElementById("btnAdd").disabled = on;
  }
  function setStatus(msg) { document.getElementById("status").textContent = msg; }
  function initials(name) { return String(name).split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2); }
  function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  init();
</script>
</body>
</html>
